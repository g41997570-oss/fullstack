<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Transaction Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>💳 Online Payment Simulation</h1>

<div class="container">

    <div class="account">
        <h2>User Account</h2>
        <p>Balance: ₹<span id="userBalance"></span></p>
    </div>

    <div class="account">
        <h2>Merchant Account</h2>
        <p>Balance: ₹<span id="merchantBalance"></span></p>
    </div>

    <div class="payment-box">
        <h3>Make Payment</h3>

        <input type="number" id="amount" placeholder="Enter amount">

        <button onclick="processPayment()">Pay Now</button>
    </div>

    <h3 id="status"></h3>

</div>

<script src="script.js"></script>
</body>
</html>
