<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Management System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🛒 Order Management Dashboard</h1>

<div class="container">

    <h2>Customer Order History (JOIN Result)</h2>
    <table id="orderTable">
        <thead>
            <tr>
                <th>Customer</th>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="results">
        <h3 id="highestOrder"></h3>
        <h3 id="activeCustomer"></h3>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
